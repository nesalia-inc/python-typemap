[project]
name = "typemap"
version = "0.1.0"
description = "PEP 827 type manipulation library"
requires-python = ">=3.14"
dependencies = [
    "annotationlib>=0.4.0",
    "typing_extensions>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "hypothesis",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
