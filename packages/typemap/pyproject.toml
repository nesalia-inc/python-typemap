[project]
name = "typemap"
version = "0.1.0"
description = "PEP 827 type manipulation library"
requires-python = ">=3.14"
dependencies = [
    "typing_extensions>=4.0",
]

[dependency-groups]
dev = [
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
package = true
